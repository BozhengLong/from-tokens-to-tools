id: shanghai-weather
name:
  zh: "上海天气提醒"
  en: "Shanghai weather reminder"
taskPrompt:
  zh: "查一下上海明天的天气,然后给我发一条通知总结天气情况;如果会下雨或降水概率较高,在通知里提醒我带伞。"
  en: "Check tomorrow's weather in Shanghai, then send me a notification summarizing it; if it will rain or precipitation probability is high, remind me to bring an umbrella in the notification."
tools:
  - get_weather
  - send_notification
finalActionTools:
  - send_notification
